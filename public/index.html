<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Under Maintenance</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family:
          system-ui,
          -apple-system,
          'Segoe UI',
          Roboto,
          sans-serif;
        background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        color: #e2e8f0;
        padding: 1.5rem;
      }
      .card {
        max-width: 420px;
        width: 100%;
        text-align: center;
        background: rgba(30, 41, 59, 0.8);
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 16px;
        padding: 2.5rem 2rem;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      }
      .icon {
        width: 64px;
        height: 64px;
        margin: 0 auto 1.5rem;
        background: rgba(251, 191, 36, 0.2);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        color: #fbbf24;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
        color: #f8fafc;
      }
      p {
        color: #94a3b8;
        line-height: 1.6;
        font-size: 0.95rem;
      }
      .small {
        margin-top: 1.5rem;
        font-size: 0.8rem;
        color: #64748b;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon" aria-hidden="true">&#9881;</div>
      <h1>Under Maintenance</h1>
      <p>We're performing scheduled updates. Please check back shortly.</p>
      <p class="small">Thank you for your patience.</p>
    </div>
  </body>
</html>
